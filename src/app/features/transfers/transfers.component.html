<div class="cc-page">
  <div class="cc-row">
    <h2 class="cc-grow" style="margin:0">Transfers</h2>
    <button class="btn btn-primary btn-sm" (click)="openCreate()">
      <i class="bi bi-plus-lg"></i> New Transfer
    </button>
  </div>

  <div class="cc-card" style="padding:0; overflow:hidden">
    @if (transfers().length === 0) {
      <app-empty-state icon="bi-arrow-left-right" title="No transfers found"
        subtitle="Use the button above to record a transfer between accounts" />
    } @else {
      <div class="table-responsive">
        <table class="table mb-0">
          <thead>
            <tr>
              <th>Date</th>
              <th>Description</th>
              <th>From</th>
              <th>To</th>
              <th class="text-end">Amount</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            @for (row of transfers(); track row.id) {
              <tr>
                <td class="date-cell">{{ row.date | date:'M/d/yyyy' }}</td>
                <td class="desc-cell">{{ row.description }}</td>
                <td>{{ row.fromAccountName }}</td>
                <td>{{ row.toAccountName }}</td>
                <td class="text-end">
                  <span class="cc-amount cc-amount-transfer">
                    {{ row.amount | financialAmount }}
                  </span>
                </td>
                <td class="actions-cell">
                  <button class="btn btn-link btn-sm text-danger p-0"
                    title="Delete transfer"
                    (click)="deleteTransfer(row)">
                    <i class="bi bi-trash"></i>
                  </button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    }

    <app-bs-paginator
      [length]="total()"
      [pageSize]="pageSize()"
      [pageIndex]="pageIndex()"
      [pageSizeOptions]="[10, 20, 50]"
      (page)="onPageChange($event)"
    />
  </div>
</div>
