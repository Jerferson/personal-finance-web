<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999">
  @for (toast of toastService.toasts(); track toast.id) {
    <div class="toast show align-items-center border-0 mb-2"
      [class.bg-success]="toast.type === 'success'"
      [class.bg-danger]="toast.type === 'error'"
      [class.bg-secondary]="toast.type === 'info'"
      style="min-width:260px">
      <div class="d-flex">
        <div class="toast-body text-white fw-500">{{ toast.message }}</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto"
          (click)="toastService.remove(toast.id)"></button>
      </div>
    </div>
  }
</div>
